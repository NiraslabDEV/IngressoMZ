services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ingresso
      POSTGRES_PASSWORD: ingresso_dev
      POSTGRES_DB: ingresso_mz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingresso -d ingresso_mz"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ingresso:ingresso_dev@db:5432/ingresso_mz

volumes:
  postgres_data:
