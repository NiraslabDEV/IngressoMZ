name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ingresso_test"
      NEXTAUTH_SECRET: "ci-test-secret-32-chars-minimum!!"
      NEXTAUTH_URL: "http://localhost:3000"
      MPESA_API_KEY: "ci-test-mpesa-key"
      MPESA_BASE_URL: "https://mock.mpesa.mz"
      EMOLA_API_KEY: "ci-test-emola-key"
      EMOLA_BASE_URL: "https://mock.emola.mz"
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      PLATFORM_FEE_PERCENT: "7.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --no-coverage --forceExit
